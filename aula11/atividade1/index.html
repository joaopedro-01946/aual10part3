<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Hospitalar - Groq Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col md:flex-row">

    <div class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r border-slate-200 p-4 flex flex-col gap-4 shadow-sm">
        <div>
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                🩺 MedAgent AI
            </h1>
            <p class="text-xs text-slate-500 mt-1">Painel de Configuração do Agente</p>
        </div>
        
        <hr class="border-slate-200">

        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-slate-600">Groq API Key:</label>
            <input type="password" id="apiKey" placeholder="gsk_..." class="w-full text-sm p-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500">
            <p class="text-[10px] text-slate-400">Sua chave fica salva apenas no seu navegador.</p>
        </div>

        <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs font-semibold text-slate-600">Prompt do Sistema (Comportamento):</label>
            <textarea id="systemPrompt" class="w-full text-xs p-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 h-48 md:h-full resize-none">Você é o MedAgent, o assistente virtual cordial do Hospital Vitalidade. 
Seu objetivo é ajudar pacientes com:
1. Informações de horários (Seg a Sex, 7h às 22h).
2. Especialidades disponíveis (Cardiologia, Pediatria, Clínico Geral, Ortopedia).
3. Orientações gerais de triagem informativa.

Regras CRÍTICAS:
- Nunca dê diagnósticos definitivos.
- Se o usuário relatar sintomas graves (dor no peito forte, falta de ar severa, desmaio), diga IMEDIATAMENTE de forma clara para ele procurar o pronto-socorro ou ligar para o SAMU (192).</textarea>
        </div>
        
        <button id="btnSalvar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded text-sm transition-colors">
            Atualizar Agente
        </button>
    </div>

    <div class="flex-1 flex flex-col h-full bg-slate-100">
        <div class="bg-white p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <div>
                    <h2 class="font-semibold text-slate-800 text-sm">Atendimento Virtual</h2>
                    <p class="text-xs text-slate-400">Online e pronto para ajudar</p>
                </div>
            </div>
            <button id="btnLimpar" class="text-xs text-red-500 hover:underline">Limpar Conversa</button>
        </div>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex justify-start">
                <div class="bg-white text-slate-800 p-3 rounded-lg max-w-[80%] shadow-sm text-sm border border-slate-100">
                    Olá! Sou o assistente do Hospital Vitalidade. Como posso ajudar você hoje?
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-slate-200">
            <form id="chatForm" class="flex gap-2">
                <input type="text" id="userInput" placeholder="Digite sua dúvida aqui... (ex: Quais os horários de atendimento?)" class="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500" autocomplete="off">
                <button type="submit" id="btnEnviar" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                    Enviar
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKey');
        const systemPromptInput = document.getElementById('systemPrompt');
        const btnLimpar = document.getElementById('btnLimpar');

        // Histórico de mensagens da sessão
        let msgHistory = [];

        // Carregar dados salvos do localStorage ao iniciar
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('groq_api_key')) {
                apiKeyInput.value = localStorage.getItem('groq_api_key');
            }
            if(localStorage.getItem('hospital_system_prompt')) {
                systemPromptInput.value = localStorage.getItem('hospital_system_prompt');
            }
        });

        // Salvar configurações
        document.getElementById('btnSalvar').addEventListener('click', () => {
            localStorage.setItem('groq_api_key', apiKeyInput.value.trim());
            localStorage.setItem('hospital_system_prompt', systemPromptInput.value.trim());
            alert('Configurações do agente atualizadas com sucesso!');
        });

        // Limpar chat
        btnLimpar.addEventListener('click', () => {
            msgHistory = [];
            chatContainer.innerHTML = `
                <div class="flex justify-start">
                    <div class="bg-white text-slate-800 p-3 rounded-lg max-w-[80%] shadow-sm text-sm border border-slate-100">
                        Histórico limpo. Como posso ajudar você agora?
                    </div>
                </div>
            `;
        });

        // Função para adicionar mensagem na tela
        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';

            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? 'bg-blue-600 text-white p-3 rounded-lg max-w-[80%] shadow-sm text-sm' 
                : 'bg-white text-slate-800 p-3 rounded-lg max-w-[80%] shadow-sm text-sm border border-slate-100';
            
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Envio da mensagem e requisição à API do Groq
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const systemPrompt = systemPromptInput.value.trim();

            if (!text) return;

            if (!apiKey) {
                alert('Por favor, insira sua Groq API Key na barra lateral.');
                return;
            }

            // Exibe mensagem do usuário
            appendMessage('user', text);
            userInput.value = '';

            // Adiciona ao histórico do chat
            msgHistory.push({ role: 'user', content: text });

            // Cria o payload incluindo o System Prompt atualizado
            const messagesPayload = [
                { role: 'system', content: systemPrompt },
                ...msgHistory
            ];

            // Feedback visual de carregamento
            const typingWrapper = document.createElement('div');
            typingWrapper.className = 'flex justify-start temp-loading';
            typingWrapper.innerHTML = `<div class="bg-slate-200 text-slate-500 p-3 rounded-lg text-sm italic">Digitando...</div>`;
            chatContainer.appendChild(typingWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama3-8b-8192', // Modelo rápido e eficiente em custo/desempenho
                        messages: messagesPayload,
                        temperature: 0.5,
                        max_tokens: 512
                    })
                });

                // Remove indicador de carregamento
                document.querySelector('.temp-loading')?.remove();

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Erro na requisição');
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // Adiciona resposta ao histórico e à tela
                msgHistory.push({ role: 'assistant', content: reply });
                appendMessage('agent', reply);

            } catch (error) {
                document.querySelector('.temp-loading')?.remove();
                appendMessage('agent', `Erro: ${error.message}. Verifique sua API Key e conexão.`);
            }
        });
    </script>
</body>
</html>
